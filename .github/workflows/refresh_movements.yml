name: Refresh Movements

on:
  schedule:
    - cron: '0 3 * * *'   # A las 3:00 AM cada día
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-movements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python scripts/fetch_movements.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/movements.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Actualizar movimientos $(date +'%Y-%m-%d')"
          git push