name: Refresh Underlying

on:
  schedule:
    - cron: '5 3 * * *'   # 3:05 AM every day (after movements)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-underlying:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas
      - run: python scripts/calculate_underlying.py
      - run: |
          git config user.name "github-actions[bot]"
          git add data/underlying.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update underlying portfolio $(date +'%Y-%m-%d')"
          git push