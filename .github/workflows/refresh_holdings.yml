name: Refresh ETF Holdings

on:
  schedule:
    - cron: '30 3 * * *'   # 3:30 AM every day (after prices)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holdings:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install pandas requests openpyxl
      - run: python scripts/fetch_holdings.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/holdings/
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update ETF holdings $(date +'%Y-%m-%d')"
          git push