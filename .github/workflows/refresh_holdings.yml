name: Refresh ETF Holdings

on:
  schedule:
    - cron: '0 2 1 * *'   # 1st day of month at 2 AM
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holdings:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install pandas requests
      
      - name: Fetch ETF holdings
        run: |
          python scripts/fetch_holdings.py
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/holdings/
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update ETF holdings $(date +'%Y-%m-%d')"
          git push