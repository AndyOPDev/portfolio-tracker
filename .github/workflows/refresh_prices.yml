name: Refresh Portfolio Data

on:
  schedule:
    - cron: '*/30 * * * *'    # Cada 30 minutos
  workflow_dispatch:           # Para ejecutar manualmente desde GitHub

permissions:
  contents: write              # Necesario para hacer commit

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Fetch stock prices from Yahoo Finance
        run: |
          python scripts/fetch_prices.py
      
      - name: Fetch movements from Google Sheets
        run: |
          python scripts/fetch_movements.py
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Actualizar datos portfolio $(date +'%Y-%m-%d %H:%M')"
          git push