name: Refresh Prices

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install yfinance pandas requests beautifulsoup4 lxml
      - run: python scripts/fetch_prices.py
      - run: |
          git config user.name "github-actions[bot]"
          git add data/prices.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update prices $(date +'%Y-%m-%d %H:%M')"
          git push