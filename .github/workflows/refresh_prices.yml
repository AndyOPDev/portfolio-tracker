name: Refresh Prices

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - run: pip install yfinance pandas requests beautifulsoup4 lxml
      
      # Primero, crear movements.json si no existe (con fallback)
      - name: Fetch movements
        run: python scripts/fetch_movements.py
      
      # Luego, fetch prices (ya tiene fallback de tickers)
      - name: Fetch prices
        run: python scripts/fetch_prices.py
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update prices $(date +'%Y-%m-%d %H:%M')"
          git push