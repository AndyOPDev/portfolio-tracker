<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Portfolio Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:#fff}
    input{background:#2C2C2E;border:none;border-radius:12px;padding:12px 14px;font-size:15px;color:#fff;outline:none;width:100%;margin-bottom:10px;font-family:inherit}
    input::placeholder{color:#636366}
    button{font-family:inherit;cursor:pointer}
    ::-webkit-scrollbar{width:0}

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; transform: scale(1.02); }
      100% { opacity: 1; }
    }
    
    button {
      transition: all 0.2s ease;
    }

    /* Responsive layout */
    @media (min-width: 768px) {
      .distribution-block {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 24px;
      }
      .distribution-donut {
        width: 240px;
        flex-shrink: 0;
      }
      .distribution-bars {
        flex: 1;
      }
    }   

    @media (max-width: 767px) {
      .distribution-block {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .distribution-donut {
        width: 200px;
        margin: 0 auto;
      }
      .distribution-bars {
        width: 100%;
      }
    }

    @keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(4px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Smooth transition for tab content */
.tab-content {
  animation: fadeIn 0.25s ease-out;
}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module" src="app.js"></script>
</body>
</html>
